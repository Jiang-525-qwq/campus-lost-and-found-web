<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>内容管理</title>
<style>
    body { font-family: Arial; background: #f5f6fa; }

    .nav {
        background: #409eff;
        padding: 15px;
        color: white;
        display: flex;
        justify-content: space-between;
    }

    .nav a {
        color: white;
        margin-right: 20px;
        text-decoration: none;
        font-weight: bold;
    }

    .container {
        width: 95%;
        margin: 20px auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
    }

    .toolbar {
        margin-bottom: 15px;
    }

    input, select {
        padding: 6px;
        margin-right: 10px;
    }

    button {
        padding: 6px 10px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    .search { background: #409eff; color: white; }
    .delete { background: #909399; color: white; }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th, td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: center;
    }

    th {
        background: #409eff;
        color: white;
    }

    .pagination {
        margin-top: 15px;
        text-align: center;
    }

    .pagination button {
        margin: 3px;
        background: #eee;
    }
</style>
</head>
<body>

<!-- 导航 -->
<div class="nav">
    <div>管理员后台</div>
    <div>
        <a href="user_manage.html">用户管理</a>
        <a href="content_manage.html">内容管理</a>
    </div>
</div>

<div class="container">

<h2>内容管理</h2>

<!-- 搜索 + 筛选 -->
<div class="toolbar">
    <input type="text" placeholder="输入物品名称">
    <select>
        <option>全部状态</option>
        <option>已发布</option>
        <option>已下架</option>
    </select>
    <button class="search">搜索</button>
</div>

<table>
<tr>
    <th>ID</th>
    <th>类型</th>
    <th>物品</th>
    <th>发布者</th>
    <th>状态</th>
    <th>操作</th>
</tr>

<tr>
    <td>2001</td>
    <td>招领</td>
    <td>校园卡</td>
    <td>李四</td>
    <td>已发布</td>
    <td><button class="delete">下架</button></td>
</tr>

<tr>
    <td>2002</td>
    <td>寻物</td>
    <td>钱包</td>
    <td>张三</td>
    <td>已发布</td>
    <td><button class="delete">下架</button></td>
</tr>

<tr>
    <td>2003</td>
    <td>招领</td>
    <td>钥匙</td>
    <td>王五</td>
    <td>已下架</td>
    <td><button class="delete">恢复</button></td>
</tr>

</table>

<!-- 分页 -->
<div class="pagination">
    <button>上一页</button>
    <button>1</button>
    <button>2</button>
    <button>下一页</button>
</div>

</div>

</body>
</html>
