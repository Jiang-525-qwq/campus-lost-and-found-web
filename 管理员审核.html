<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>管理员审核页面</title>
<style>
    body { font-family: Arial; background: #f5f6fa; }
    h2 { text-align: center; }

    table {
        width: 95%;
        margin: 20px auto;
        border-collapse: collapse;
        background: white;
    }

    th, td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: center;
    }

    th { background: #409eff; color: white; }

    .tag {
        padding: 3px 8px;
        border-radius: 4px;
        color: white;
        font-size: 12px;
    }
    .lost { background: #e6a23c; }
    .found { background: #67c23a; }
    .pending { background: #909399; }

    button {
        padding: 5px 10px;
        margin: 2px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    .pass { background: #67c23a; color: white; }
    .reject { background: #f56c6c; color: white; }
    .detail { background: #409eff; color: white; }
</style>
</head>
<body>

<h2>信息审核管理</h2>

<table>
<tr>
    <th>ID</th>
    <th>类型</th>
    <th>物品名称</th>
    <th>发布人</th>
    <th>时间</th>
    <th>状态</th>
    <th>查看详情</th>
    <th>操作</th>
</tr>

<tr>
    <td>1</td>
    <td><span class="tag lost">寻物</span></td>
    <td>黑色钱包</td>
    <td>张三</td>
    <td>2026-03-18</td>
    <td><span class="tag pending">待审核</span></td>
    <td>
        <button class="detail" onclick="viewDetail(1)">查看</button>
    </td>
    <td>
        <button class="pass" onclick="approve(1)">通过</button>
        <button class="reject" onclick="reject(1)">驳回</button>
    </td>
</tr>

<tr>
    <td>2</td>
    <td><span class="tag found">招领</span></td>
    <td>校园卡</td>
    <td>李四</td>
    <td>2026-03-17</td>
    <td><span class="tag pending">待审核</span></td>
    <td>
        <button class="detail" onclick="viewDetail(2)">查看</button>
    </td>
    <td>
        <button class="pass" onclick="approve(2)">通过</button>
        <button class="reject" onclick="reject(2)">驳回</button>
    </td>
</tr>

<tr>
    <td>3</td>
    <td><span class="tag lost">寻物</span></td>
    <td>蓝牙耳机</td>
    <td>王五</td>
    <td>2026-03-16</td>
    <td><span class="tag pending">待审核</span></td>
    <td>
        <button class="detail" onclick="viewDetail(3)">查看</button>
    </td>
    <td>
        <button class="pass" onclick="approve(3)">通过</button>
        <button class="reject" onclick="reject(3)">驳回</button>
    </td>
</tr>

</table>

<script>
function viewDetail(id){
    alert("查看详情 ID=" + id + "\n（这里后续可以跳转到详情页面）");
}

function approve(id){
    alert("审核通过 ID=" + id);
}

function reject(id){
    let reason = prompt("请输入驳回原因：");
    if(reason){
        alert("已驳回 ID=" + id + " 原因：" + reason);
    }
}
</script>

</body>
</html>
