<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>失物招领 - 发布信息</title>
    <style>

        body {
            background-color: #f5f7fa;/*页面背景色*/
            padding: 20px;/*页面内边距*/
        }

        /* 页面容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;/*水平居中*/
            background:white;/*容器背景*/
            padding: 30px;/*容器内边距*/
        }

        /* 标题样式 */
        .page-title {
            text-align: center;/*文字居中*/
            color: #050000;/*文字颜色*/
            margin-bottom: 30px;/*底部外边距*/
            font-size: 24px;/*字体大小*/
            padding-bottom: 10px;/*底部内边距*/
        }

        /* 表单样式 */
        .post-form {/*把子元素排列整齐*/
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;/*标签在上，输入框在下*/
            gap: 8px;/*输入框与标签的距离*/
        }
        /*标签样式*/
        .form-group label {
            font-weight: 600;/*字体加粗*/
            color: #555;/*标签颜色*/
            font-size: 14px;/*字体*/
        }

        /*输入框样式*/
        .form-group input,/*文本框*/
        .form-group select,/*下拉框*/
        .form-group textarea /*文本域*/
        {
            padding: 12px;/*内边距*/
            border: 1px solid #ddd;/*边框*/
            font-size: 14px;/*字体大小*/
        }

        /*聚焦状态：蓝色边框*/
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #409eff;
        }

        /* 文本域样式：最小高度150px，仅允许垂直拉伸 */
        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        /* 按钮样式 */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 10px;
        }

        .btn {
            padding: 12px 30px;/*内边距*/
            border: none;/*清除默认边框*/
            font-size: 16px;/*字体大小*/
        }

        /*提交按钮颜色*/
        .btn-submit {
            background-color: #409eff;
            color: white;
        }
        /*重置按钮颜色*/
        .btn-reset {
            background-color: #e6a23c;
            color: white;
        }


    </style>
</head>
<body>
    <div class="container">
        <h1 class="page-title">失物招领 - 发布信息</h1>
        
        <form class="post-form" id="lostFoundForm">
            <!-- 信息类型：丢失/捡到 -->
            <div class="form-group">
                <label for="infoType">信息类型</label>
                <select id="infoType" required>
                    <option value="">请选择</option>
                    <option value="lost">我丢失了物品</option>
                    <option value="found">我捡到了物品</option>
                </select>
            </div>

            <!-- 物品名称 -->
            <div class="form-group">
                <label for="itemName">物品名称</label>
                <input type="text" id="itemName" placeholder="例如：校园卡、手机、钱包等" required>
            </div>

            <!-- 物品分类 -->
            <div class="form-group">
                <label for="itemCategory">物品分类</label>
                <select id="itemCategory" required>
                    <option value="">请选择</option>
                    <option value="card">证件类（校园卡、身份证、银行卡等）</option>
                    <option value="electronic">电子类（手机、耳机、充电宝等）</option>
                    <option value="bag">包类（书包、钱包、手提包等）</option>
                    <option value="daily">日常用品（水杯、雨伞、钥匙等）</option>
                    <option value="other">其他物品</option>
                </select>
            </div>

            <!-- 丢失/捡到时间 -->
            <div class="form-group">
                <label for="occurTime">时间</label>
                <input type="datetime-local" id="occurTime" required>
            </div>

            <!-- 丢失/捡到地点 -->
            <div class="form-group">
                <label for="occurLocation">地点</label>
                <input type="text" id="occurLocation" placeholder="请详细描述地点" required>
            </div>

            <!-- 物品描述 -->
            <div class="form-group">
                <label for="itemDesc">物品描述</label>
                <textarea id="itemDesc" placeholder="请详细描述物品特征、外观、品牌、颜色、有无特殊标记等" required></textarea>
            </div>

            <!-- 联系方式 -->
            <div class="form-group">
                <label for="contact">联系方式</label>
                <input type="text" id="contact"  required>
            </div>

            <!-- 提交/重置按钮 -->
            <div class="btn-group">
                <button type="submit" class="btn btn-submit">提交信息</button>
                <button type="reset" class="btn btn-reset">重置表单</button>
            </div>
        </form>
    </div>

    <script>
        // 表单提交验证
        const form = document.getElementById('lostFoundForm');
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // 阻止默认提交行为
            
            // 获取表单数据
            const infoType = document.getElementById('infoType').value;
            const itemName = document.getElementById('itemName').value;
            const contact = document.getElementById('contact').value;

            // 简单验证，核心字段不能为空
            if (!infoType || !itemName || !contact) {
                alert('请填写必填项！');
                return;
            }

            // 提交成功提示
            alert('发布成功！你的失物招领信息已提交。');
            form.reset(); // 重置表单
        });
    </script>
</body>
</html>
