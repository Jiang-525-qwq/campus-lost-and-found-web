<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>用户管理</title>
<style>
    body { font-family: Arial; background: #f5f6fa; }

    /* 顶部导航 */
    .nav {
        background: #409eff;
        padding: 15px;
        color: white;
        display: flex;
        justify-content: space-between;
    }

    .nav a {
        color: white;
        margin-right: 20px;
        text-decoration: none;
        font-weight: bold;
    }

    .container {
        width: 95%;
        margin: 20px auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
    }

    /* 搜索区域 */
    .toolbar {
        margin-bottom: 15px;
    }

    input, select {
        padding: 6px;
        margin-right: 10px;
    }

    button {
        padding: 6px 10px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    .search { background: #409eff; color: white; }
    .ban { background: #f56c6c; color: white; }
    .enable { background: #67c23a; color: white; }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th, td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: center;
    }

    th {
        background: #409eff;
        color: white;
    }

    .status-ok { color: green; }
    .status-ban { color: red; }

    /* 分页 */
    .pagination {
        margin-top: 15px;
        text-align: center;
    }

    .pagination button {
        margin: 3px;
        background: #eee;
    }
</style>
</head>
<body>

<!-- 导航 -->
<div class="nav">
    <div>管理员后台</div>
    <div>
        <a href="user_manage.html">用户管理</a>
        <a href="content_manage.html">内容管理</a>
    </div>
</div>

<div class="container">

<h2>用户管理</h2>

<!-- 搜索 + 筛选 -->
<div class="toolbar">
    <input type="text" placeholder="输入学号/用户名">
    <select>
        <option>全部状态</option>
        <option>正常</option>
        <option>已封禁</option>
    </select>
    <button class="search">搜索</button>
</div>

<table>
<tr>
    <th>ID</th>
    <th>学号</th>
    <th>用户名</th>
    <th>联系方式</th>
    <th>状态</th>
    <th>操作</th>
</tr>

<tr>
    <td>1001</td>
    <td>20230001</td>
    <td>张三</td>
    <td>13800000000</td>
    <td class="status-ok">正常</td>
    <td><button class="ban">封禁</button></td>
</tr>

<tr>
    <td>1002</td>
    <td>20230002</td>
    <td>李四</td>
    <td>13900000000</td>
    <td class="status-ban">已封禁</td>
    <td><button class="enable">解封</button></td>
</tr>

<tr>
    <td>1003</td>
    <td>20230003</td>
    <td>王五</td>
    <td>13700000000</td>
    <td class="status-ok">正常</td>
    <td><button class="ban">封禁</button></td>
</tr>

</table>

<!-- 分页 -->
<div class="pagination">
    <button>上一页</button>
    <button>1</button>
    <button>2</button>
    <button>下一页</button>
</div>

</div>

</body>
</html>
